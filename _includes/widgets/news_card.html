<div class="card my-4">
  <div class="card-header">
    <h2><i class="fa-solid fa-rss"></i> News</h2>
  </div>

  <div class="card-body news-timeline">

    {% assign news_by_year = site.news | sort: "date" | reverse | group_by_exp: "item", "item.date | date: '%Y'" %}

    {% for year in news_by_year %}

      <div class="news-year-block">

        <div class="news-year">
          {{ year.name }}
          <button class="news-toggle" onclick="toggleNewsYear('{{ year.name }}')">
            Show details
          </button>
        </div>

        <div class="news-year-content" id="news-{{ year.name }}">

          {% for news in year.items %}

            <div class="news-entry">
              <div class="news-dot"></div>

              <div class="news-text">
                <div class="news-date">
                  {{ news.date | date: "%d %B %Y" }}
                </div>

                <h3>
                  {{ news.title }}
                </h3>

                <div class="news-content">
                  {{ news.content }}
                </div>
              </div>
            </div>

          {% endfor %}

        </div>

      </div>

    {% endfor %}

  </div>
</div>

<script>
function toggleNewsYear(year) {
  const block = document.getElementById("news-" + year);
  if (!block) return;

  if (block.style.display === "none") {
    block.style.display = "block";
  } else {
    block.style.display = "none";
  }
}
</script>
