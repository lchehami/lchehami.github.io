short_bio: >-
  <p>
    A <a href="https://www.uphf.fr/iemn/membres/chehami_lynda" target="_blank">Lynda Chehami</a>
   Lynda Chehami is an Associate Professor (HDR) in Physical Acoustics at Université Polytechnique des Hauts-de-France. Her research lies at the intersection of wave physics, ultrasonics, and complex media, with a strong focus on developing next-generation passive imaging approaches.

She obtained her PhD in Electronics in 2015 from the IEMN, in collaboration with the Institut Langevin, where she pioneered work on wave correlation and ultrasonic imaging in reverberant environments. She later held a postdoctoral position at Georgia Tech Lorraine, further strengthening her expertise in wave propagation in complex and engineered media.
She obtained her Habilitation (HDR) in 2022 and is currently developing ambitious research directions at the frontier of physics, materials science, and sensing, with potential applications ranging from micro/nano-systems to health and advanced materials.
  </p>
  <p>
     
Her current research aims to turn ambient and uncontrolled wave fields into sources of information, enabling non-invasive characterization of thin films and multilayer systems. By engineering correlation-compatible environments, her work challenges conventional paradigms based on controlled excitation, opening new routes toward passive, high-resolution, and scalable imaging technologies.
My research focuses on ultrasonic waves, passive imaging and wave correlation in complex and reverberant media. I develop innovative approaches for thin films, guided waves, metamaterials and structural health monitoring. .
  </p>

