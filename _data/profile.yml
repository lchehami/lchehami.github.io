short_bio: >-
  <p>
    Lynda Chehami is an Associate Professor (HDR) in Physical Acoustics at 
    Université Polytechnique Hauts-de-France and IEMN, CNRS UMR 8520. Her research 
    lies at the intersection of wave physics, ultrasonics, and complex media, with a 
    strong focus on next-generation passive imaging approaches. Her current research aims to turn ambient and uncontrolled wave fields into sources of information, 
    enabling non-invasive characterization of thin films. By engineering correlation-compatible 
    environments, her work opens new routes toward passive, high-resolution, and scalable imaging technologies.
  </p>



