<!DOCTYPE html>
<html lang="en">
<!-- Template: https://github.com/luost26/academic-homepage -->

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>{{ page.title }} - {{ site.data.profile.navbar_name }}</title>

    <!-- Stylesheets -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Fira+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

    <link rel="stylesheet" href="{{ '/assets/css/global.css' | relative_url }}">

</head>

<body class="bg-light" {{ page.body_attr }}>

    {% include navbar.html %}

    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
        {{content}}
    </div>

    {% include footer.html %}

    <!-- Scripts -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery.lazy/1.7.9/jquery.lazy.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/js/bootstrap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/github-buttons/2.14.2/buttons.min.js"></script>

    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

    <script defer
        src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

    <!-- KaTeX -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            renderMathInElement(document.body, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false }
                ],
                throwOnError: false
            });

        });
    </script>

    <!-- Theme Scripts -->
    <script src="{{ '/assets/js/common.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/bubble_visual_hash.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/semantic_scholar_citation_count.js' | relative_url }}"></script>

    <!-- DARK / LIGHT MODE -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const toggle = document.getElementById("themeToggle");

            if (!toggle) return;

            /* Restore saved theme */
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark");
                toggle.textContent = "☀️";
            }

            /* Toggle theme */
            toggle.onclick = function () {

                document.body.classList.toggle("dark");

                if (document.body.classList.contains("dark")) {
                    localStorage.setItem("theme", "dark");
                    toggle.textContent = "☀️";
                } else {
                    localStorage.setItem("theme", "light");
                    toggle.textContent = "🌙";
                }

            };

        });
    </script>

</body>
</html>
